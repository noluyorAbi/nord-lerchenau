name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Build (includes typecheck + generates next-env.d.ts)
        run: bun run build
        env:
          DATABASE_URI: postgres://ci:ci@localhost:5432/ci
          PAYLOAD_SECRET: ci-secret-ci-secret-ci-secret-ci
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000
          REVALIDATE_SECRET: ci

      - name: Unit tests
        run: bun run test
